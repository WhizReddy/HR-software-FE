services:
  caddy:
    image: caddy:2.8-alpine
    container_name: hr-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - hrnet

  frontend:
    image: ghcr.io/${GHCR_OWNER}/hr-frontend:main
    container_name: hr-frontend
    restart: unless-stopped
    networks:
      - hrnet

  backend:
    image: ghcr.io/${GHCR_OWNER}/hr-backend:main
    container_name: hr-backend
    restart: unless-stopped
    env_file:
      - ./backend.env
    networks:
      - hrnet

networks:
  hrnet:
    name: hrnet

volumes:
  caddy_data:
  caddy_config:
